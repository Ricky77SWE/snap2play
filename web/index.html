<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snap2Play</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .home-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 18px 18px 24px;
      box-sizing: border-box;
      position: relative;
      z-index: 1;
    }

    .home-top {
      width: 100%;
      min-height: 8px;
      flex: 0 0 auto;
    }

    .home-center {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .tagline {
      font-size: 17px;
      font-weight: 800;
      opacity: 0.96;
      margin: 0 0 8px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
      letter-spacing: 0.2px;
    }

    .home-main-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 100%;
      margin-top: 4px;
    }

    .home-bottom {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 14px;
      flex: 0 0 auto;
    }

    .challenge-btn-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }

    @media (orientation: landscape) {
      .home-layout {
        padding: 10px 18px 14px;
      }

      .home-center {
        gap: 6px;
      }

      .tagline {
        margin-bottom: 4px;
      }

      .home-main-row {
        flex-direction: row;
        align-items: flex-start;
        justify-content: center;
        gap: 18px;
        width: auto;
      }

      .home-bottom {
        display: none;
      }

      .challenge-btn-wrap.landscape-inline {
        display: flex;
      }
    }

    @media (orientation: portrait) {
      .challenge-btn-wrap.landscape-inline {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="page home-layout">
    <div class="home-top"></div>

    <div class="home-center">
      <img src="assets/logo.png" class="logo" alt="Snap2Play logo">
      <div class="tagline">Create. Play. Share.</div>

      <div class="home-main-row">
        <div class="square-action square-camera img-btn" onclick="openCamera()" role="button" aria-label="Take Photo">
          <img src="assets/btn_camera_square.png" class="square-action-image" alt="Take Photo">
        </div>

        <div class="square-action square-gallery img-btn" onclick="openGallery()" role="button" aria-label="Choose Image">
          <img src="assets/btn_gallery_square.png" class="square-action-image" alt="Choose Image">
        </div>

        <div class="challenge-btn-wrap landscape-inline" onclick="goLibrary()" aria-label="Open Challenges">
          <img src="assets/btn_challenges_square.png" class="square-action-image square-challenges" alt="Challenges">
        </div>
      </div>
    </div>

    <div class="home-bottom">
      <div class="challenge-btn-wrap" onclick="goLibrary()" aria-label="Open Challenges">
        <img src="assets/btn_challenges_square.png" class="square-action-image square-challenges" alt="Challenges">
      </div>
    </div>
  </div>

  <script>
    async function openCamera() {
      try {
        const CameraPlugin = window.Capacitor?.Plugins?.Camera;
        if (!CameraPlugin) {
          alert("Camera plugin not available");
          return;
        }

        const result = await CameraPlugin.getPhoto({
          quality: 90,
          allowEditing: false,
          resultType: "uri",
          source: "CAMERA",
          saveToGallery: false,
          correctOrientation: true
        });

        if (!result || !result.webPath) return;
        await handlePickedImage(result.webPath);
      } catch (err) {
        console.error("openCamera failed", err);
      }
    }

    async function openGallery() {
      try {
        const CameraPlugin = window.Capacitor?.Plugins?.Camera;
        if (!CameraPlugin) {
          alert("Camera plugin not available");
          return;
        }

        const result = await CameraPlugin.getPhoto({
          quality: 90,
          allowEditing: false,
          resultType: "uri",
          source: "PHOTOS",
          correctOrientation: true
        });

        if (!result || !result.webPath) return;
        await handlePickedImage(result.webPath);
      } catch (err) {
        console.error("openGallery failed", err);
      }
    }

    async function handlePickedImage(webPath) {
      const img = new Image();

      img.onload = function () {
        const canvas = document.createElement("canvas");
        const max = 1600;

        let w = img.width;
        let h = img.height;

        const scale = Math.min(1, max / Math.max(w, h));
        w = Math.round(w * scale);
        h = Math.round(h * scale);

        canvas.width = w;
        canvas.height = h;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, w, h);

        const compressed = canvas.toDataURL("image/jpeg", 0.88);

        localStorage.setItem("tempImage", compressed);
        localStorage.setItem("tempImageMeta", JSON.stringify({ width: w, height: h }));
        localStorage.setItem("gameConfig", JSON.stringify({ type: "puzzle", size: 3 }));

        window.location = "game.html";
      };

      img.onerror = function (e) {
        console.error("Image load failed", e);
      };

      img.src = webPath;
    }

    function goLibrary() {
      window.location = "library.html";
    }

    function handleIncomingUrl(url) {
      if (!url) return;

      try {
        const u = new URL(url);
        let challengeId = u.searchParams.get("c");

        if (!challengeId && u.protocol === "snap2play:" && u.hostname === "challenge") {
          challengeId = u.searchParams.get("c");
        }

        if (challengeId) {
          window.location.href = `game.html?c=${encodeURIComponent(challengeId)}`;
        }
      } catch (e) {
        console.log("Could not parse incoming URL", e);
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      if (window.Capacitor?.Plugins?.App) {
        const App = window.Capacitor.Plugins.App;

        App.addListener("appUrlOpen", (event) => {
          handleIncomingUrl(event.url);
        });

        const launch = await App.getLaunchUrl();
        if (launch?.url) {
          handleIncomingUrl(launch.url);
        }
      }
    });
  </script>
</body>
</html>
