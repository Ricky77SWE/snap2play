<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0,
      maximum-scale=1.0,
      user-scalable=no,
      viewport-fit=cover
    "
  />
  <title>Snap2Play - Puzzle</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .game-wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding:
        calc(env(safe-area-inset-top, 0px) + 12px)
        12px
        calc(env(safe-area-inset-bottom, 0px) + 18px);
      box-sizing: border-box;
    }

    .game-header {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      min-height: 56px;
      margin-bottom: 4px;
      flex: 0 0 auto;
    }

    .game-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .mode-note {
      margin: 0 0 8px;
      padding: 8px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(8px);
      font-size: 14px;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(0,0,0,0.16);
      display: none;
    }

    .diff-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: nowrap;
      margin: 0 0 10px;
      padding: 0 4px;
      position: relative;
      z-index: 2;
    }

    .diff-chip {
      padding: 8px 10px;
      min-width: 50px;
      border-radius: 12px;
      background: rgba(255,255,255,0.16);
      backdrop-filter: blur(8px);
      box-shadow: 0 0 10px rgba(255,255,255,0.08);
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      transition: transform 0.1s ease, background 0.12s ease, opacity 0.12s ease;
      user-select: none;
    }

    @media (max-width: 430px) {
      .diff-chip {
        padding: 7px 8px;
        min-width: 46px;
        font-size: 12px;
        border-radius: 11px;
      }

      .diff-row {
        gap: 5px;
      }
    }


    .diff-chip:active {
      transform: scale(0.96);
    }

    .diff-chip.active {
      background: rgba(255, 196, 0, 0.92);
      color: #1a1a1a;
    }

    .diff-chip.locked {
      opacity: 0.55;
    }

    .diff-chip.challenge-disabled {
      opacity: 0.38;
      cursor: default;
    }

    .board-wrap {
      width: min(92vw, 520px);
      margin: 0 auto;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .board {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: grid;
      gap: 2px;
      touch-action: none;
      background: rgba(255,255,255,0.10);
      border-radius: 14px;
      padding: 2px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.22);
      position: relative;
      overflow: hidden;
      transition:
        gap 0.35s ease,
        padding 0.35s ease,
        border-radius 0.35s ease,
        background 0.35s ease,
        box-shadow 0.35s ease;
    }

    .board.puzzle-complete {
      gap: 0;
      padding: 0;
      border-radius: 16px;
      background: transparent;
      box-shadow:
        0 18px 42px rgba(0,0,0,0.28),
        0 0 28px rgba(255,255,255,0.18),
        0 0 38px rgba(120,220,255,0.12);
      animation: solvedFlash 0.8s ease;
    }

    @keyframes solvedFlash {
      0%   { filter: brightness(1); transform: scale(1); }
      30%  { filter: brightness(1.18); transform: scale(1.01); }
      60%  { filter: brightness(1.10); transform: scale(1.006); }
      100% { filter: brightness(1); transform: scale(1); }
    }

    .board-shimmer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      border-radius: inherit;
      background:
        linear-gradient(
          115deg,
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,0.0) 28%,
          rgba(255,255,255,0.58) 48%,
          rgba(255,255,255,0.0) 68%,
          rgba(255,255,255,0) 100%
        );
      transform: translateX(-135%);
    }

    .board-shimmer.run {
      animation: shimmerSweep 1.55s ease forwards;
    }

    @keyframes shimmerSweep {
      0% {
        opacity: 0;
        transform: translateX(-135%);
      }
      10% {
        opacity: 1;
      }
      100% {
        opacity: 1;
        transform: translateX(135%);
      }
    }

    .puzzle-piece {
      position: relative;
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
      background-repeat: no-repeat;
      box-shadow: 0 6px 18px rgba(0,0,0,0.22);
      transform: translateZ(0);
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      transition:
        border-radius 0.35s ease,
        box-shadow 0.35s ease,
        opacity 0.15s ease;
    }

    .board.puzzle-complete .puzzle-piece {
      border-radius: 0;
      box-shadow: none;
    }

    .puzzle-piece:active {
      cursor: grabbing;
    }

    .puzzle-piece.hover-target {
      outline: 4px solid rgba(255, 213, 74, .92);
      box-shadow:
        0 0 0 6px rgba(255, 213, 74, .28) inset,
        0 10px 28px rgba(0,0,0,.35);
    }

    .puzzle-piece.dragging {
      opacity: .35;
    }

    .drag-clone {
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }

    .win {
      display: none;
      margin-top: 18px;
      position: relative;
      z-index: 2;
      opacity: 0;
      transform: translateY(14px) scale(0.98);
      text-align: center;
    }

    .win.show {
      display: block;
      animation: revealWin 0.55s ease forwards;
    }

    @keyframes revealWin {
      0% {
        opacity: 0;
        transform: translateY(14px) scale(0.98);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .win-title {
      font-size: 34px;
      font-weight: 900;
      line-height: 1.05;
      text-shadow: 0 4px 14px rgba(0,0,0,0.32);
      margin-bottom: 8px;
    }

    .win-subtitle {
      font-size: 15px;
      font-weight: 700;
      opacity: 0.92;
      text-shadow: 0 2px 8px rgba(0,0,0,0.28);
      margin-bottom: 10px;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin: 14px 14px 10px;
    }

    .action-btn {
      min-width: 158px;
      min-height: 66px;
      padding: 14px 18px;
      border: 0;
      border-radius: 22px;
      font-size: 18px;
      font-weight: 900;
      color: white;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow:
        0 12px 26px rgba(0,0,0,0.22),
        0 0 14px rgba(255,255,255,0.08);
    }

    .action-btn .icon {
      font-size: 22px;
      line-height: 1;
    }

    .action-btn.primary {
      background: linear-gradient(180deg, #ffc93c, #ff8b00);
      box-shadow:
        0 12px 26px rgba(0,0,0,0.22),
        0 0 16px rgba(255,181,0,0.35);
    }

    .action-btn.secondary {
      background: linear-gradient(180deg, #62c7ff, #2f66e8);
      box-shadow:
        0 12px 26px rgba(0,0,0,0.22),
        0 0 16px rgba(105,189,255,0.28);
    }

    .action-btn.tertiary {
      background: linear-gradient(180deg, #7bc7ff, #4b87ff);
      box-shadow:
        0 12px 26px rgba(0,0,0,0.22),
        0 0 16px rgba(125,190,255,0.22);
    }

    .action-btn:active {
      transform: scale(0.96);
      filter: brightness(1.06);
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 12px 14px 0;
    }

    .stat-pill {
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.16);
      backdrop-filter: blur(8px);
      font-weight: 900;
      font-size: 17px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
      min-width: 128px;
    }

    @media (orientation: landscape) {
      body {
        overflow-y: auto;
      }

      .game-wrap {
        padding:
          calc(env(safe-area-inset-top, 0px) + 8px)
          16px
          calc(env(safe-area-inset-bottom, 0px) + 12px);
      }

      .game-header {
        min-height: 48px;
        margin-bottom: 0;
      }

      .game-main {
        justify-content: center;
      }

      .diff-row {
        margin-bottom: 8px;
      }

      .board-wrap {
        width: min(70vw, 920px);
      }

      .board {
        max-height: 62vh;
      }

      .action-btn {
        min-width: 150px;
        min-height: 62px;
        font-size: 17px;
      }

      .win-title {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="page game-wrap">
    <div class="game-header">
      <div class="back-btn" onclick="goBack()">←</div>
    </div>

    <div class="game-main">
      <div class="mode-note" id="modeNote"></div>
      <div class="diff-row" id="diffRow"></div>

      <div class="board-wrap" id="boardWrap">
        <div id="board" class="board"></div>
        <div id="boardShimmer" class="board-shimmer"></div>
      </div>

      <div class="win" id="win">
        <div class="win-title">🎉 Great job!</div>
        <div class="win-subtitle">You solved the puzzle!</div>

        <div class="actions">
          <button class="action-btn secondary" onclick="saveGame()">
            <span class="icon">💾</span>
            <span>Save</span>
          </button>

          <button class="action-btn primary" onclick="shareGame()">
            <span class="icon">🚀</span>
            <span>Challenge</span>
          </button>
        </div>

        <div class="actions">
          <button class="action-btn tertiary" onclick="restart()">
            <span class="icon">🔄</span>
            <span>Play Again</span>
          </button>
        </div>

        <div class="stats">
          <div class="stat-pill" id="movesStat">Moves: 0</div>
          <div class="stat-pill" id="timeStat">Time: 0s</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const FREE_LIMIT = 3;
    const SHARE_LIFETIME = 24 * 60 * 60 * 1000;

    const SIZE_LEVELS = [2, 3, 4, 5, 6, 7, 8];
    const UNLOCK_REQUIREMENTS = {
      2: 0,
      3: 0,
      4: 0,
      5: 5,
      6: 15,
      7: 35,
      8: 60
    };

    let image = localStorage.getItem("tempImage");
    let config = JSON.parse(localStorage.getItem("gameConfig") || '{"type":"puzzle","size":3}');
    let size = config?.size || 3;

    const board = document.getElementById("board");
    const boardWrap = document.getElementById("boardWrap");
    const boardShimmer = document.getElementById("boardShimmer");
    const winEl = document.getElementById("win");
    const movesStatEl = document.getElementById("movesStat");
    const timeStatEl = document.getElementById("timeStat");
    const diffRowEl = document.getElementById("diffRow");
    const modeNoteEl = document.getElementById("modeNote");
    const imageMeta = JSON.parse(localStorage.getItem("tempImageMeta") || '{"width":1,"height":1}');

    let puzzleSolved = false;
    let moves = 0;
    let startTime = 0;
    let elapsedSeconds = 0;
    let timerInterval = null;
    let winCounted = false;

    let challengeMode = false;
    let challengeLockedSize = null;

    function getProfileStats() {
      return JSON.parse(localStorage.getItem("profileStats") || '{"completedCount":0}');
    }

    function saveProfileStats(stats) {
      localStorage.setItem("profileStats", JSON.stringify(stats));
    }

    function incrementCompletedCountOnce() {
      if (winCounted) return;
      winCounted = true;
      const stats = getProfileStats();
      stats.completedCount = Number(stats.completedCount || 0) + 1;
      saveProfileStats(stats);
    }

    function getCompletedCount() {
      return Number(getProfileStats().completedCount || 0);
    }

    function isSizeUnlocked(targetSize) {
      if (challengeMode && targetSize === challengeLockedSize) return true;
      return getCompletedCount() >= (UNLOCK_REQUIREMENTS[targetSize] || 0);
    }

    function isChallengeSharedGame() {
      const params = new URLSearchParams(location.search);
      return params.has("share");
    }

    function persistConfig() {
      localStorage.setItem("gameConfig", JSON.stringify({ type: "puzzle", size }));
    }

    function renderModeNote() {
      if (challengeMode) {
        modeNoteEl.style.display = "block";
        modeNoteEl.textContent = `Challenge mode • ${size}x${size} locked`;
      } else {
        modeNoteEl.style.display = "none";
        modeNoteEl.textContent = "";
      }
    }

    function renderDifficultyChips() {
      diffRowEl.innerHTML = "";

      SIZE_LEVELS.forEach(level => {
        const chip = document.createElement("div");
        chip.className = "diff-chip";
        chip.textContent = `${level}x${level}`;

        if (level === size) {
          chip.classList.add("active");
        }

        if (challengeMode) {
          if (level !== challengeLockedSize) {
            chip.classList.add("challenge-disabled");
          }
        } else {
          const unlocked = isSizeUnlocked(level);
          if (!unlocked) {
            chip.classList.add("locked");
            chip.textContent = `${level}x${level} 🔒`;
          }
        }

        chip.onclick = () => setSize(level);
        diffRowEl.appendChild(chip);
      });
    }

    function setSize(newSize) {
      if (challengeMode) return;

      if (!isSizeUnlocked(newSize)) {
        const needed = UNLOCK_REQUIREMENTS[newSize] || 0;
        const current = getCompletedCount();
        const left = Math.max(0, needed - current);
        alert(`Finish ${left} more puzzle${left === 1 ? "" : "s"} to unlock ${newSize}x${newSize}.`);
        return;
      }

      size = newSize;
      persistConfig();
      renderDifficultyChips();
      restart();
    }

    function premium() {
      alert("Premium coming 😄");
    }

    function goBack() {
      window.location = "index.html";
    }

    function cleanupSharedGames() {
      let shared = JSON.parse(localStorage.getItem("sharedGames") || "[]");
      const now = Date.now();

      shared = shared.filter(g => now - g.createdAt < SHARE_LIFETIME);
      localStorage.setItem("sharedGames", JSON.stringify(shared));
    }

    function loadShared() {
      const params = new URLSearchParams(location.search);
      const id = params.get("share");
      if (!id) return;

      cleanupSharedGames();

      let shared = JSON.parse(localStorage.getItem("sharedGames") || "[]");
      const game = shared.find(g => g.id === id);

      if (game) {
        image = game.image;
        config = game.config || { type: "puzzle", size: 3 };
        size = config.size || 3;
        challengeMode = true;
        challengeLockedSize = size;
        localStorage.setItem("tempImage", image);
        persistConfig();
      } else {
        alert("This shared puzzle has expired ⏳");
      }
    }

    function resetStats() {
      moves = 0;
      elapsedSeconds = 0;
      startTime = Date.now();
      movesStatEl.textContent = "Moves: 0";
      timeStatEl.textContent = "Time: 0s";

      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (puzzleSolved) return;
        elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
      }, 250);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
    }

    function applyBoardAspect() {
      const ratio = imageMeta.width / imageMeta.height;

      boardWrap.style.width = "min(92vw, 520px)";
      board.style.width = "100%";
      board.style.aspectRatio = `${imageMeta.width} / ${imageMeta.height}`;
      board.style.height = "auto";

      if (ratio > 1.4) {
        board.style.maxHeight = "60vh";
      } else if (ratio < 0.8) {
        board.style.maxHeight = "70vh";
      } else {
        board.style.maxHeight = "";
      }

      if (window.matchMedia("(orientation: landscape)").matches) {
        boardWrap.style.width = "min(70vw, 920px)";
      }
    }

    function buildPuzzle() {
      puzzleSolved = false;
      winCounted = false;
      applyBoardAspect();
      renderModeNote();
      renderDifficultyChips();

      winEl.classList.remove("show");
      winEl.style.display = "none";
      board.classList.remove("puzzle-complete");
      boardShimmer.classList.remove("run");
      resetStats();

      board.innerHTML = "";
      board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
      board.style.gridTemplateRows = `repeat(${size}, 1fr)`;

      const total = size * size;
      const order = [...Array(total).keys()];

      for (let i = order.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [order[i], order[j]] = [order[j], order[i]];
      }

      if (order.every((v, i) => v === i) && order.length > 1) {
        [order[0], order[1]] = [order[1], order[0]];
      }

      const pieces = [];

      for (let i = 0; i < total; i++) {
        const correctIndex = i;
        const posX = (correctIndex % size);
        const posY = Math.floor(correctIndex / size);

        const piece = document.createElement("div");
        piece.className = "puzzle-piece";
        piece.draggable = true;
        piece.dataset.correct = String(correctIndex);

        piece.style.backgroundImage = `url("${image}")`;
        piece.style.backgroundSize = `${size * 100}% ${size * 100}%`;
        piece.style.backgroundPosition =
          `${(posX * 100) / (Math.max(size - 1, 1))}% ${(posY * 100) / (Math.max(size - 1, 1))}%`;

        pieces.push(piece);
      }

      const frag = document.createDocumentFragment();
      order.forEach(idx => frag.appendChild(pieces[idx]));
      board.appendChild(frag);

      enableDnD();
    }

    function enableDnD() {
      let dragged = null;
      let hoverEl = null;

      board.addEventListener("dragstart", onDragStart);
      board.addEventListener("dragend", onDragEnd);
      board.addEventListener("dragover", onDragOver);
      board.addEventListener("dragleave", onDragLeave);
      board.addEventListener("drop", onDrop);

      function onDragStart(e) {
        const el = e.target;
        if (!el.classList.contains("puzzle-piece") || puzzleSolved) return;
        dragged = el;
        dragged.classList.add("dragging");
      }

      function onDragEnd() {
        if (dragged) dragged.classList.remove("dragging");
        dragged = null;
        if (hoverEl) {
          hoverEl.classList.remove("hover-target");
          hoverEl = null;
        }
      }

      function onDragOver(e) {
        e.preventDefault();
        if (puzzleSolved) return;
        const t = e.target;
        if (!t.classList.contains("puzzle-piece") || t === dragged) return;

        if (hoverEl && hoverEl !== t) hoverEl.classList.remove("hover-target");
        hoverEl = t;
        hoverEl.classList.add("hover-target");
      }

      function onDragLeave(e) {
        const t = e.target;
        if (t === hoverEl) {
          t.classList.remove("hover-target");
          hoverEl = null;
        }
      }

      function onDrop(e) {
        e.preventDefault();
        if (puzzleSolved) return;
        const t = e.target;
        if (!dragged || !t.classList.contains("puzzle-piece") || dragged === t) return;

        swapPieces(dragged, t);
        maybeWin();
      }

      Array.from(board.querySelectorAll(".puzzle-piece")).forEach(piece => enableTouchDrag(piece));

      function enableTouchDrag(piece) {
        let clone = null;
        let currentHover = null;
        let startW = 0;
        let startH = 0;

        piece.addEventListener("touchstart", e => {
          if (puzzleSolved) return;
          const t = e.touches[0];
          startW = piece.offsetWidth;
          startH = piece.offsetHeight;

          clone = piece.cloneNode(true);
          Object.assign(clone.style, {
            position: "fixed",
            left: `${t.clientX - startW / 2}px`,
            top: `${t.clientY - startH / 2}px`,
            width: `${startW}px`,
            height: `${startH}px`,
            zIndex: 1000,
            opacity: 0.92,
            pointerEvents: "none",
            border: "2px solid rgba(255,255,255,.25)"
          });
          clone.classList.add("drag-clone");
          document.body.appendChild(clone);
          piece.classList.add("dragging");
        }, { passive: true });

        piece.addEventListener("touchmove", e => {
          if (puzzleSolved) return;
          e.preventDefault();
          const t = e.touches[0];

          if (clone) {
            clone.style.left = `${t.clientX - startW / 2}px`;
            clone.style.top = `${t.clientY - startH / 2}px`;
          }

          const target = document.elementFromPoint(t.clientX, t.clientY);

          if (target && target.classList.contains("puzzle-piece") && target !== piece) {
            if (currentHover && currentHover !== target) {
              currentHover.classList.remove("hover-target");
            }
            currentHover = target;
            currentHover.classList.add("hover-target");
          } else if (currentHover) {
            currentHover.classList.remove("hover-target");
            currentHover = null;
          }
        }, { passive: false });

        piece.addEventListener("touchend", () => {
          if (clone) {
            clone.remove();
            clone = null;
          }

          piece.classList.remove("dragging");

          if (puzzleSolved) return;

          if (currentHover) {
            swapPieces(piece, currentHover);
            currentHover.classList.remove("hover-target");
            currentHover = null;
            maybeWin();
          }
        }, { passive: true });
      }
    }

    function swapPieces(a, b) {
      const kids = Array.from(board.children);
      const ia = kids.indexOf(a);
      const ib = kids.indexOf(b);
      if (ia < 0 || ib < 0) return;

      if (ia < ib) {
        board.insertBefore(a, b.nextSibling);
        board.insertBefore(b, board.children[ia]);
      } else {
        board.insertBefore(b, a.nextSibling);
        board.insertBefore(a, board.children[ib]);
      }

      moves += 1;
      a.classList.remove("dragging");
      b.classList.remove("dragging");
      a.classList.remove("hover-target");
      b.classList.remove("hover-target");
    }

    function maybeWin() {
      if (puzzleSolved) return;

      const kids = Array.from(board.children);
      const ok = kids.every((el, i) => String(i) === el.dataset.correct);

      if (!ok) return;

      puzzleSolved = true;
      stopTimer();
      incrementCompletedCountOnce();

      movesStatEl.textContent = `Moves: ${moves}`;
      timeStatEl.textContent = `Time: ${formatTime(elapsedSeconds)}`;

      board.classList.add("puzzle-complete");

      board.animate(
        [
          { transform: "scale(1)" },
          { transform: "scale(1.018)" },
          { transform: "scale(1)" }
        ],
        { duration: 650 }
      );

      runVictoryShimmerSequence();

      setTimeout(() => {
        winEl.style.display = "block";
        requestAnimationFrame(() => {
          winEl.classList.add("show");
        });
      }, 1900);
    }

    function runVictoryShimmerSequence() {
      boardShimmer.classList.remove("run");
      void boardShimmer.offsetWidth;
      boardShimmer.classList.add("run");

      setTimeout(() => {
        boardShimmer.classList.remove("run");
        void boardShimmer.offsetWidth;
        boardShimmer.classList.add("run");
      }, 900);
    }

    function formatTime(totalSeconds) {
      const mins = Math.floor(totalSeconds / 60);
      const secs = totalSeconds % 60;
      if (mins <= 0) return `${secs}s`;
      return `${mins}m ${secs}s`;
    }

    function restart() {
      buildPuzzle();
    }

    function getGames() {
      return JSON.parse(localStorage.getItem("games") || "[]");
    }

    function saveGame() {
      let games = getGames();

      if (games.length >= FREE_LIMIT) {
        alert("You reached the free limit of 3 saved games. Premium coming soon 😄");
        return;
      }

      games.push({
        id: Date.now().toString(),
        image,
        config: { type: "puzzle", size },
        createdAt: Date.now(),
        moves,
        time: elapsedSeconds
      });

      localStorage.setItem("games", JSON.stringify(games));
      alert("Saved to Challenges!");
    }

    function shareGame() {
      cleanupSharedGames();

      const id = Date.now().toString();
      let shared = JSON.parse(localStorage.getItem("sharedGames") || "[]");

      shared.push({
        id,
        image,
        config: { type: "puzzle", size },
        createdAt: Date.now(),
        moves,
        time: elapsedSeconds
      });

      localStorage.setItem("sharedGames", JSON.stringify(shared));

      const link = `${window.location.origin}${window.location.pathname}?share=${id}`;
      const shareText = `Try my ${size}x${size} puzzle! 😄 ${link}`;

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(link).catch(() => {});
      }

      if (navigator.share) {
        navigator.share({
          title: "Snap2Play",
          text: `Try my ${size}x${size} puzzle! 😄`,
          url: link
        }).catch(() => {
          fallbackShare(shareText, link);
        });
      } else {
        fallbackShare(shareText, link);
      }
    }

    function fallbackShare(shareText, link) {
      const smsLink = `sms:?&body=${encodeURIComponent(shareText)}`;
      const useSms = confirm(
        "Sharing is limited in local preview.\n\nPress OK to open SMS, or Cancel to copy/show the link."
      );

      if (useSms) {
        window.location.href = smsLink;
      } else {
        prompt("Copy this link:", link);
      }
    }

    loadShared();

    if (!image) {
      window.location = "index.html";
    } else {
      buildPuzzle();
    }

    window.addEventListener("resize", applyBoardAspect);
  </script>
</body>
</html>
