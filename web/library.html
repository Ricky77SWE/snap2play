<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snap2Play - Challenges</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .card-stats {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 0 10px 12px;
    }

    .mini-stat {
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-bar">
      <div class="back-btn" onclick="goBack()">←</div>
      <div class="top-title">Challenges</div>
      <div style="width:50px;"></div>
    </div>

    <div class="library-wrap">
      <div id="grid" class="grid"></div>
      <div id="emptyState" class="empty-state" style="display:none;">
        No saved games yet
      </div>
    </div>

    <div id="paywall" class="paywall">
      <div class="paywall-title">Free limit reached</div>
      <div class="paywall-text">Save up to 3 games for free. Premium will unlock more.</div>
      <button class="action-btn" onclick="upgrade()">Upgrade</button>
    </div>
  </div>

  <script>
    const FREE_LIMIT = 3;
    const SHARE_LIFETIME = 24 * 60 * 60 * 1000;
    const CLOUD_BASE_URL = "https://your-backend-url.com";

    function goBack() {
      window.location.href = "index.html";
    }

    function getGames() {
      return JSON.parse(localStorage.getItem("games") || "[]");
    }

    function showPaywall() {
      document.getElementById("paywall").style.display = "block";
    }

    function upgrade() {
      alert("Hook up Stripe / in-app purchase here 💰");
    }

    function cleanupSharedGames() {
      let shared = JSON.parse(localStorage.getItem("sharedGames") || "[]");
      const now = Date.now();

      shared = shared.filter(g => now - g.createdAt < SHARE_LIFETIME);
      localStorage.setItem("sharedGames", JSON.stringify(shared));
    }

    function formatTime(totalSeconds) {
      const secs = Number(totalSeconds || 0);
      const mins = Math.floor(secs / 60);
      const rest = secs % 60;

      if (mins <= 0) return `${rest}s`;
      return `${mins}m ${rest}s`;
    }

    function render() {
      const grid = document.getElementById("grid");
      const emptyState = document.getElementById("emptyState");
      grid.innerHTML = "";

      const games = getGames();

      if (!games.length) {
        emptyState.style.display = "block";
      } else {
        emptyState.style.display = "none";
      }

      games.forEach((g) => {
        const div = document.createElement("div");
        div.className = "card";

        const sizeLabel = g?.config?.size ? `${g.config.size}x${g.config.size}` : "3x3";
        const movesLabel = typeof g.moves === "number" ? g.moves : "-";
        const timeLabel = formatTime(g.time);

        div.innerHTML = `
          <img src="${g.image}" alt="Saved game">
          <div class="card-meta">Puzzle ${sizeLabel}</div>
          <div class="card-stats">
            <div class="mini-stat">Moves: ${movesLabel}</div>
            <div class="mini-stat">Time: ${timeLabel}</div>
          </div>
        `;

        div.onclick = () => {
          localStorage.setItem("tempImage", g.image);
          localStorage.setItem("gameConfig", JSON.stringify(g.config || { type: "puzzle", size: 3 }));
          window.location.href = "game.html";
        };

        grid.appendChild(div);
      });

      if (games.length >= FREE_LIMIT) {
        showPaywall();
      }
    }

    cleanupSharedGames();
    render();
  </script>
</body>
</html>
