<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snap2Play</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .home-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100vh;
      padding: 26px 18px 36px;
      position: relative;
      z-index: 1;
    }

    .home-top {
      width: 100%;
      display: flex;
      justify-content: flex-end;
    }

    .home-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      margin-top: -20px;
    }

    .home-bottom {
      display: flex;
      justify-content: center;
      margin-bottom: 6px;
    }

    .settings-gear {
      font-size: 28px;
      text-shadow: 0 3px 10px rgba(0,0,0,0.3);
      opacity: 0.92;
    }
  </style>
</head>
<body>
  <div class="page home-layout">
    <div class="home-top"></div>

    <div class="home-center">
      <img src="assets/logo.png" class="logo" alt="Snap2Play logo">

      <label class="img-btn">
        <img src="assets/btn_camera.png" class="btn-primary" alt="Take Photo">
        <input id="cameraInput" class="hidden-input" type="file" accept="image/*" capture="environment">
      </label>

      <label class="img-btn">
        <img src="assets/btn_gallery.png" class="btn-secondary-large" alt="Choose Image">
        <input id="galleryInput" class="hidden-input" type="file" accept="image/*">
      </label>
    </div>

    <div class="home-bottom">
      <img src="assets/btn_secondary.png" class="btn-small img-btn" alt="Challenges" onclick="goLibrary()">
    </div>
  </div>

  <script>
    document.getElementById("cameraInput").addEventListener("change", handleImage);
    document.getElementById("galleryInput").addEventListener("change", handleImage);

    function compressImageToDataUrl(file, callback) {
      const reader = new FileReader();

      reader.onload = function (ev) {
        const img = new Image();

        img.onload = function () {
          const canvas = document.createElement("canvas");
          const max = 512;

          let w = img.width;
          let h = img.height;

          if (w > h) {
            if (w > max) {
              h *= max / w;
              w = max;
            }
          } else {
            if (h > max) {
              w *= max / h;
              h = max;
            }
          }

          canvas.width = Math.round(w);
          canvas.height = Math.round(h);

          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

          const compressed = canvas.toDataURL("image/jpeg", 0.7);
          callback(compressed);
        };

        img.src = ev.target.result;
      };

      reader.readAsDataURL(file);
    }

    function handleImage(e) {
      const file = e.target.files[0];
      if (!file) return;

      compressImageToDataUrl(file, function (compressed) {
        localStorage.setItem("tempImage", compressed);
        localStorage.setItem("gameConfig", JSON.stringify({ type: "puzzle", size: 3 }));
        window.location = "game.html";
      });

      e.target.value = "";
    }

    function goLibrary() {
      window.location = "library.html";
    }
  </script>
</body>
</html>
